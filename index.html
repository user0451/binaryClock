<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description"
		content="An animated, CSS-forward binary clock with learning overlays, a rolling digital readout, theme switching, and responsive controls.">
	<meta name="keywords"
		content="binary clock, CSS animation, JavaScript clock, responsive design, web accessibility, clock themes, digital clock, learning tool">
	<meta name="author" content="hue kares @ Spinning Rock">
	<link rel="icon" href="favicon.png" type="image/png">
	<link rel="canonical" href="https://spinningrock.net/binary/">
	<meta name="robots" content="index, follow">
	<title>Binary Clock</title>
	<script>
		(function () {
			var savedTheme = localStorage.getItem("binaryClockTheme") || "classic-rgb-neon";
			document.documentElement.setAttribute("data-theme", savedTheme);
		})();
	</script>
	<link rel="stylesheet" href="style.css">
</head>

<body>
	<main class="appShell">
		<div class="clock" data-mode="6bit" role="timer" aria-live="polite" aria-label="Binary clock display">
			<div class="timeGroup hours" data-unit="hours">
				<div class="digit tens" aria-hidden="true">
					<div class="bit" data-not6Bit id="hoursTens8"></div>
					<div class="bit" data-not6Bit id="hoursTens4"></div>
					<div class="bit hour1" id="hoursTens2"></div>
					<div class="bit hour2" id="hoursTens1"></div>
					<div class="helpRows4" aria-hidden="true">
						<span class="helpPlusRow" data-pos="1">+</span>
						<span class="helpPlusRow" data-pos="2">+</span>
						<span class="helpPlusRow" data-pos="3">+</span>
					</div>
				</div>
				<div class="digit units" aria-hidden="true">
					<div class="bit hour3" id="hours8"></div>
					<div class="bit hour4" id="hours4"></div>
					<div class="bit hour5" id="hours2"></div>
					<div class="bit hour6" id="hours1"></div>
					<div class="helpRows4" aria-hidden="true">
						<span class="helpPlusRow" data-pos="1">+</span>
						<span class="helpPlusRow" data-pos="2">+</span>
						<span class="helpPlusRow" data-pos="3">+</span>
					</div>
				</div>
				<div class="helpRows6" aria-hidden="true">
					<span class="helpPlusRow" data-pos="1">+</span>
					<span class="helpPlusRow" data-pos="2">+</span>
					<span class="helpPlusRow" data-pos="3">+</span>
					<span class="helpPlusRow" data-pos="4">+</span>
					<span class="helpPlusRow" data-pos="5">+</span>
				</div>
			</div>


			<div class="timeGroup minutes" data-unit="minutes">
				<div class="digit tens" aria-hidden="true">
					<div class="bit" data-not6Bit id="minutesTens8"></div>
					<div class="bit" data-not6Bit id="minutesTens4"></div>
					<div class="bit minute1" id="minutesTens2"></div>
					<div class="bit minute2" id="minutesTens1"></div>
					<div class="helpRows4" aria-hidden="true">
						<span class="helpPlusRow" data-pos="1">+</span>
						<span class="helpPlusRow" data-pos="2">+</span>
						<span class="helpPlusRow" data-pos="3">+</span>
					</div>
				</div>
				<div class="digit units" aria-hidden="true">
					<div class="bit minute3" id="minutes8"></div>
					<div class="bit minute4" id="minutes4"></div>
					<div class="bit minute5" id="minutes2"></div>
					<div class="bit minute6" id="minutes1"></div>
					<div class="helpRows4" aria-hidden="true">
						<span class="helpPlusRow" data-pos="1">+</span>
						<span class="helpPlusRow" data-pos="2">+</span>
						<span class="helpPlusRow" data-pos="3">+</span>
					</div>
				</div>
				<div class="helpRows6" aria-hidden="true">
					<span class="helpPlusRow" data-pos="1">+</span>
					<span class="helpPlusRow" data-pos="2">+</span>
					<span class="helpPlusRow" data-pos="3">+</span>
					<span class="helpPlusRow" data-pos="4">+</span>
					<span class="helpPlusRow" data-pos="5">+</span>
				</div>
			</div>


			<div class="timeGroup seconds" data-unit="seconds">
				<div class="digit tens" aria-hidden="true">
					<div class="bit" data-not6Bit id="secondsTens8"></div>
					<div class="bit" data-not6Bit id="secondsTens4"></div>
					<div class="bit second1" id="secondsTens2"></div>
					<div class="bit second2" id="secondsTens1"></div>
					<div class="helpRows4" aria-hidden="true">
						<span class="helpPlusRow" data-pos="1">+</span>
						<span class="helpPlusRow" data-pos="2">+</span>
						<span class="helpPlusRow" data-pos="3">+</span>
					</div>
				</div>
				<div class="digit units" aria-hidden="true">
					<div class="bit second3" id="seconds8"></div>
					<div class="bit second4" id="seconds4"></div>
					<div class="bit second5" id="seconds2"></div>
					<div class="bit second6" id="seconds1"></div>
					<div class="helpRows4" aria-hidden="true">
						<span class="helpPlusRow" data-pos="1">+</span>
						<span class="helpPlusRow" data-pos="2">+</span>
						<span class="helpPlusRow" data-pos="3">+</span>
					</div>
				</div>
				<div class="helpRows6" aria-hidden="true">
					<span class="helpPlusRow" data-pos="1">+</span>
					<span class="helpPlusRow" data-pos="2">+</span>
					<span class="helpPlusRow" data-pos="3">+</span>
					<span class="helpPlusRow" data-pos="4">+</span>
					<span class="helpPlusRow" data-pos="5">+</span>
				</div>
			</div>

		</div>

		<section class="digitalPanel" aria-live="polite" aria-label="Help digital" aria-hidden="true" role="button"
			tabindex="0" aria-description="Click to toggle 12/24 hour format">
			<div class="digitalRow" data-mode="all">
				<div class="digitalCell">
					<span class="digitalLabel">H</span>
					<span class="digitalValue" id="digital-hours">00</span>
				</div>
				<div class="digitalCell">
					<span class="digitalLabel">M</span>
					<span class="digitalValue" id="digital-minutes">00</span>
				</div>
				<div class="digitalCell">
					<span class="digitalLabel">S</span>
					<span class="digitalValue" id="digital-seconds">00</span>
				</div>
			</div>
			<div id="meridiemBadge" class="meridiemBadge" aria-live="polite" aria-hidden="true">AM</div>
		</section>

		<button type="button" id="settingsButton" class="settingsTrigger" aria-haspopup="dialog"
			aria-controls="settingsOverlay" aria-expanded="false">Settings</button>

		<div id="settingsOverlay" aria-hidden="true">
			<section id="switch-container" aria-label="Clock controls" role="dialog" aria-modal="true"
				aria-labelledby="settingsTitle">
				<div class="settingsHeader">
					<h2 id="settingsTitle">Clock Settings</h2>
					<button type="button" id="settingsClose" class="settingsClose"
						aria-label="Close settings">Close</button>
				</div>
				<label class="switch" for="modeToggle">
					<input type="checkbox" id="modeToggle">
					<span class="slider round" aria-hidden="true"></span>
					<span class="label-text" id="modeLabel">6-bit</span>
				</label>
				<label class="switch" for="timeFormatToggle">
					<input type="checkbox" id="timeFormatToggle">
					<span class="slider round" aria-hidden="true"></span>
					<span class="label-text" id="timeFormatLabel">24h</span>
				</label>
				<label class="switch" for="digitalToggle">
					<input type="checkbox" id="digitalToggle">
					<span class="slider round" aria-hidden="true"></span>
					<span class="label-text" id="digitalLabel">Digital</span>
				</label>
				<label class="switch" for="scanlinesToggle">
					<input type="checkbox" id="scanlinesToggle">
					<span class="slider round" aria-hidden="true"></span>
					<span class="label-text" id="scanlinesLabel">Scanlines</span>
				</label>
				<label class="switch" for="orientationToggle">
					<input type="checkbox" id="orientationToggle">
					<span class="slider round" aria-hidden="true"></span>
					<span class="label-text" id="orientationLabel">Vertical</span>
				</label>
				<label class="switch" for="lsbToggle">
					<input type="checkbox" id="lsbToggle">
					<span class="slider round" aria-hidden="true"></span>
					<span class="label-text" id="lsbLabel">MSB ↑</span>
				</label>
				<label class="switch" for="helpToggle">
					<input type="checkbox" id="helpToggle">
					<span class="slider round" aria-hidden="true"></span>
					<span class="label-text" id="helpLabel">Help</span>
				</label>
				<label class="switch" for="gameModeToggle">
					<input type="checkbox" id="gameModeToggle">
					<span class="slider round" aria-hidden="true"></span>
					<span class="label-text" id="gameModeLabel">Game</span>
				</label>
				<div class="gameTypeSelect" id="gameTypeSelect" aria-hidden="true">
					<div class="gameTypeMenu">
						<button type="button" class="gameTypeOption" data-game-type="bit-clicking">
							<span class="gameTypeTitle">Bit Clicking</span>
							<span class="gameTypeDesc">Match the target number by clicking bits</span>
						</button>
						<button type="button" class="gameTypeOption" data-game-type="quiz">
							<span class="gameTypeTitle">Quiz</span>
							<span class="gameTypeDesc">Test your binary knowledge with 8 difficulty levels</span>
						</button>
						<button type="button" class="gameTypeOption gameTypeClose" data-game-type="close">
							<span class="gameTypeTitle">Close Game</span>
						</button>
					</div>
				</div>
				<div class="themeSelect">
					<button type="button" id="shuffleButton" class="shuffle-btn label-text"
						title="Shuffle off. Click to rotate themes automatically every 10 minutes."
						aria-pressed="false">Theme</button>
					<button type="button" id="themeSelectDisplay" class="theme-select-display" aria-haspopup="listbox"
						aria-expanded="false" aria-controls="themeSelectList" aria-label="Clock visual theme"></button>
					<div id="themeSelectList" class="theme-select-list" role="listbox"
						aria-label="Clock visual theme options"></div>
					<select id="themeSelect" aria-label="Clock visual theme" tabindex="-1" aria-hidden="true">
						<option value="amber-terminal">Amber Terminal</option>
						<option value="bit-boring">Bit Boring</option>
						<option value="boring-bit">Boring Bits</option>
						<option value="christmas-glow">Christmas Glow</option>
						<option value="classic-rgb-neon">Classic RGB Neon</option>
						<option value="cyberpunk-grid">Cyberpunk Grid</option>
						<option value="electric-storm">Electric Storm</option>
						<option value="enchanted-forest-glow">Enchanted Forest Glow</option>
						<option value="galactic-disco-inferno">Galactic Disco Inferno</option>
						<option value="gloomy-mist">Gloomy Mist</option>
						<option value="ice-glass">Ice Glass</option>
						<option value="matrix-pulse">Matrix Pulse</option>
						<option value="metallic-core">Metallic Core</option>
						<option value="midnight-mirage">Midnight Mirage</option>
						<option value="monochrome-noir">Monochrome Noir</option>
						<option value="retro-pixel-crunch">Retro Pixel Crunch</option>
						<option value="sunny-pop">Sunny Pop</option>
						<option value="sunset-bloom">Sunset Bloom</option>
					</select>
				</div>
			</section>
		</div>

		<!-- Bit-Clicking Game HUD (visible only in game-type-bit-clicking mode) -->
		<div id="gameHUD" class="gameHUD" aria-hidden="true" aria-live="polite" aria-atomic="true">
			<span id="gameHUDTarget" class="gameHUDTarget" aria-label="Target">0</span>
			<span class="gameHUDDivider" aria-hidden="true"></span>
			<span id="gameHUDPlayer" class="gameHUDPlayer" aria-label="Your value">0</span>
			<span class="gameHUDMeta">
				<span id="gameHUDScore" class="gameHUDScore" aria-label="Score">0</span>
				<span id="gameHUDLevel" class="gameHUDLevel" aria-label="Level">L1</span>
			</span>
			<button type="button" id="gameHUDSubmit" class="gameHUDSubmit" aria-label="Submit answer">✓</button>
		</div>

		<!-- Quiz Game HUD (visible only in game-type-quiz mode) -->
		<div id="quizHUD" class="quizHUD" aria-hidden="true" data-type="decimal-to-binary">
			<div class="quizHUDBody">
				<span id="quizHUDLabel" class="quizHUDLabel" aria-hidden="true">bin</span>
				<span id="quizHUDValue" class="quizHUDValue" aria-label="Target decimal">0</span>
				<input type="number" id="quizHUDInput" class="quizHUDInput" min="0" max="63" inputmode="numeric"
					autocomplete="off" aria-label="Your decimal answer" placeholder="?">
				<span class="quizHUDMeta">
					<span id="quizHUDProgress" class="quizHUDProgress">1/10</span>
					<span id="quizHUDScore" class="quizHUDScore">0</span>
					<span id="quizHUDLevel" class="quizHUDLevel">L1</span>
				</span>
				<button type="button" id="quizHUDSubmit" class="quizHUDSubmit" aria-label="Submit answer">✓</button>
			</div>
			<div id="quizHUDTimerTrack" class="quizHUDTimerTrack" aria-hidden="true">
				<div id="quizHUDTimerFill" class="quizHUDTimerFill"></div>
			</div>
		</div>
	</main>
	<script type="module" src="code.js"></script>
</body>

</html>
